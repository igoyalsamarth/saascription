# Build apps/www (Next.js static export) and deploy to Cloudflare Pages.
#
# Actions secrets:
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   NEXT_PUBLIC_SITE_URL — canonical site URL, e.g. https://www.example.com (no trailing slash)
#
# Actions variables:
#   CLOUDFLARE_PAGES_PROJECT_WWW — Cloudflare Pages project name for the marketing site

name: Deploy WWW (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/www/**"
      - "packages/ui/**"
      - "bun.lock"
      - ".github/workflows/www-pages-deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-www-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install monorepo dependencies
        run: bun install --frozen-lockfile

      - name: Build www
        working-directory: apps/www
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/www
          packageManager: bun
          command: pages deploy out --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_WWW }}
